<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolha do Curso - Rio+Elas</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/assistant.css">
    <link href="https://fonts.googleapis.com/css2?family=Wise:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
            .curso-container input, .curso-container select {
                color: #222 !important;
            }
        body {
            background: linear-gradient(120deg, #fff 60%, #ede7f6 100%);
            font-family: 'Wise', Arial, sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .curso-container {
            max-width: 600px;
            margin: 48px auto 0 auto;
            background: #fff;
            border-radius: 28px;
            box-shadow: 0 4px 32px rgba(0,0,0,0.10);
            padding: 44px 36px 36px 36px;
            text-align: left;
            position: relative;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #ede7f6;
            border-radius: 8px;
            margin-bottom: 24px;
            overflow: hidden;
        }
        .progress {
            height: 100%;
            background: linear-gradient(90deg, #351c75 0%, #6d44b8 100%);
            border-radius: 8px;
            transition: width 0.3s;
            width: 99%;
        }
        .curso-container h2 {
            font-size: 2em;
            font-weight: 900;
            color: #351c75;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }
        .curso-sub {
            color: #351c75;
            font-size: 1.08em;
            margin-bottom: 24px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 18px;
        }
        .form-group label {
            font-weight: 700;
            color: #351c75;
            margin-bottom: 6px;
            font-size: 1.08em;
        }
        .form-group select {
            display: block;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
            max-width: 420px;
            min-width: 260px;
            padding: 18px 16px;
            border-radius: 12px;
            border: 1.5px solid #351c75;
            font-size: 1.08em;
            font-family: 'Wise', Arial, sans-serif;
            background: #ede7f6;
            color: #222;
            transition: border 0.2s;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg fill="%23351c75" height="20" viewBox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 22px 22px;
        }
        /* Input de horário igual aos selects */
        #horario {
            display: block;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
            max-width: 420px;
            min-width: 260px;
            padding: 18px 16px;
            border-radius: 12px;
            border: 1.5px solid #351c75;
            font-size: 1.08em;
            font-family: 'Wise', Arial, sans-serif;
            background: #ede7f6;
            color: #222;
            font-weight: bold;
            transition: border 0.2s;
            outline: none;
            box-sizing: border-box;
        }
        .form-btns {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            margin-top: 18px;
            gap: 18px;
            width: 100%;
        }
        @media (max-width: 600px) {
            .form-btns {
                flex-direction: column;
                gap: 12px;
                width: 100%;
            }
        }
        .form-btns .btn-voltar, .form-btns .btn-proximo {
            min-width: 220px;
            width: 220px;
            height: 70px;
            font-size: 1.25em;
            font-weight: 800;
            border-radius: 18px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: none;
            outline: none;
            box-shadow: 0 2px 8px rgba(233,30,99,0.10);
            transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
        }
        .form-btns .btn-voltar {
            background: linear-gradient(90deg, #351c75 0%, #6d44b8 100%);
            color: #fff;
        }
        .form-btns .btn-proximo {
            background: linear-gradient(90deg, #351c75 0%, #6d44b8 100%);
            color: #fff;
        }
        }
        .btn-voltar, .btn-proximo {
            min-width: 200px;
            background: linear-gradient(90deg, #351c75 0%, #6d44b8 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 18px 40px;
            font-size: 1.18em;
            font-weight: 800;
            font-family: 'Wise', Arial, sans-serif;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(53,28,117,0.10);
            letter-spacing: 0.5px;
            transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
            outline: none;
            text-transform: uppercase;
            display: inline-block;
        }
        .btn-proximo:hover {
            background: linear-gradient(90deg, #6d44b8 0%, #351c75 100%);
            box-shadow: 0 4px 16px rgba(53,28,117,0.12);
        }
        .btn-voltar:hover {
            background: #ede7f6;
            color: #351c75;
        }
        @media (max-width: 600px) {
            .curso-container {
                padding: 18px 6px 12px 6px;
            }
            .curso-container h2 {
                font-size: 1.3em;
            }
        }
    </style>
</head>
<body>
    <script src="/static/assistant.js"></script>
    <header class="main-header">
        <div class="header-logos">
            <img src="/static/logo_fgm.png" alt="Logo FGM" class="logo">
            <img src="/static/logo-prefeitura.png" alt="Prefeitura do Rio" class="logo-prefeitura-topo">
        </div>
    </header>
    <div class="curso-container">
        <div class="progress-bar">
            <div class="progress"></div>
        </div>
        <h2>Escolha do Curso</h2>
        <p class="curso-sub">Selecione o local, curso e turma de sua preferência</p>
        <form id="form-curso" method="POST" action="/curso" autocomplete="off">
            <div class="form-group">
                <label for="local">Local do Curso *</label>
                <select id="local" name="local" required>
                    <option value="">Selecione o local</option>
                    <option value="CERES FUTEBOL CLUBE | ILHA DO GOVERNADOR">CERES FUTEBOL CLUBE | ILHA DO GOVERNADOR</option>
                    <option value="PROJETO DJALMA | BARRA DA TIJUCA">PROJETO DJALMA | BARRA DA TIJUCA</option>
                </select>
            </div>
                <div class="form-group">
                    <label for="curso">Curso *</label>
                    <select id="curso" name="curso" required>
                        <option value="">Selecione o curso</option>
                        <option value="TRANSISTA">TRANSISTA</option>
                        <option value="EXTENSÃO DE CÍLIOS">EXTENSÃO DE CÍLIOS</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="turma">Turma *</label>
                    <select id="turma" name="turma" required>
                        <option value="">Selecione a turma</option>
                        <option value="TURMA TRANSISTA 01">TURMA TRANSISTA 01</option>
                        <option value="TURMA EXTENSÃO DE CÍLIOS 01">TURMA EXTENSÃO DE CÍLIOS 01</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="horario">Horário</label>
                    <input type="text" id="horario" name="horario" readonly style="background:#ede7f6;color:#351c75;font-weight:bold;" placeholder="Selecione a turma" />
                </div>
            <div class="form-btns">
                <button type="button" class="btn-voltar">&lt; Voltar</button>
                <button type="submit" class="btn-proximo">Próximo <span style="font-size:1.2em;vertical-align:middle;">&#8594;</span></button>
            </div>
        </form>
    </div>
    <script>

        // Informações das turmas ATUALIZADAS
        const turmasInfo = [
            {
                turma: 'TURMA TRANSISTA 01',
                curso: 'TRANSISTA',
                local: 'CERES FUTEBOL CLUBE | ILHA DO GOVERNADOR',
                dias: 'segunda, terça',
                horario: '10h às 11h'
            },
            {
                turma: 'TURMA EXTENSÃO DE CÍLIOS 01',
                curso: 'EXTENSÃO DE CÍLIOS',
                local: 'PROJETO DJALMA | BARRA DA TIJUCA',
                dias: 'segunda, terça',
                horario: '09h às 12h'
            }
        ];

        const cursosPorLocal = {
            'CERES FUTEBOL CLUBE | ILHA DO GOVERNADOR': ['TRANSISTA'],
            'PROJETO DJALMA | BARRA DA TIJUCA': ['EXTENSÃO DE CÍLIOS']
        };

        const turmasPorCursoLocal = {
            'CERES FUTEBOL CLUBE | ILHA DO GOVERNADOR|TRANSISTA': ['TURMA TRANSISTA 01'],
            'PROJETO DJALMA | BARRA DA TIJUCA|EXTENSÃO DE CÍLIOS': ['TURMA EXTENSÃO DE CÍLIOS 01']
        };

        const localSelect = document.getElementById('local');
        const cursoSelect = document.getElementById('curso');
        const turmaSelect = document.getElementById('turma');
        const horarioInput = document.getElementById('horario');

        localSelect.addEventListener('change', function() {
            const local = this.value;
            cursoSelect.innerHTML = '<option value="">Selecione o curso</option>';
            turmaSelect.innerHTML = '<option value="">Selecione a turma</option>';
            horarioInput.value = '';
            if (cursosPorLocal[local]) {
                cursosPorLocal[local].forEach(curso => {
                    const opt = document.createElement('option');
                    opt.value = curso;
                    opt.textContent = curso;
                    cursoSelect.appendChild(opt);
                });
            }
        });

        cursoSelect.addEventListener('change', function() {
            const local = localSelect.value;
            const curso = this.value;
            turmaSelect.innerHTML = '<option value="">Selecione a turma</option>';
            horarioInput.value = '';
            const key = local + '|' + curso;
            if (turmasPorCursoLocal[key]) {
                turmasPorCursoLocal[key].forEach(turma => {
                    const opt = document.createElement('option');
                    opt.value = turma;
                    opt.textContent = turma;
                    turmaSelect.appendChild(opt);
                });
            }
        });

        turmaSelect.addEventListener('change', function() {
            const turma = this.value;
            const turmaObj = turmasInfo.find(t => t.turma === turma);
            if (turmaObj) {
                horarioInput.value = turmaObj.dias + ' | ' + turmaObj.horario;
            } else {
                horarioInput.value = '';
            }
        });

        document.querySelector('.btn-voltar').onclick = function() {
            window.location.href = '/endereco';
        };
    </script>
</body>
</html>
